name: Update production domain

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-production-domain.yml

permissions:
  contents: write

jobs:
  update-domain:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace production URL placeholders
        shell: python
        run: |
          from pathlib import Path

          old_base = "https://YOUR-DOMAIN.vercel.app"
          new_base = "https://lender-fit-routing-copilot.vercel.app"

          index_path = Path("site/index.html")
          index = index_path.read_text(encoding="utf-8")
          replacements = {
              f"{old_base}/lender-fit-routing-copilot/assets/images/social-preview.svg": f"{new_base}/assets/images/social-preview.svg",
              f"{old_base}/lender-fit-routing-copilot/": f"{new_base}/",
              f"{old_base}/": f"{new_base}/",
          }
          for old, new in replacements.items():
              index = index.replace(old, new)
          index_path.write_text(index, encoding="utf-8")

          robots_path = Path("site/robots.txt")
          robots = robots_path.read_text(encoding="utf-8")
          robots = robots.replace(
              f"{old_base}/lender-fit-routing-copilot/sitemap.xml",
              f"{new_base}/sitemap.xml",
          )
          robots_path.write_text(robots, encoding="utf-8")

          sitemap_path = Path("site/sitemap.xml")
          sitemap = sitemap_path.read_text(encoding="utf-8")
          sitemap = sitemap.replace(
              f"{old_base}/lender-fit-routing-copilot/embed/",
              f"{new_base}/embed/",
          )
          sitemap = sitemap.replace(
              f"{old_base}/lender-fit-routing-copilot/",
              f"{new_base}/",
          )
          sitemap_path.write_text(sitemap, encoding="utf-8")

          for path in (index_path, robots_path, sitemap_path):
              content = path.read_text(encoding="utf-8")
              if "YOUR-DOMAIN" in content:
                  raise SystemExit(f"Placeholder remains in {path}")

      - name: Commit production URLs
        shell: bash
        run: |
          if git diff --quiet -- site/index.html site/robots.txt site/sitemap.xml; then
            echo "No URL changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.html site/robots.txt site/sitemap.xml
          git commit -m "Set production Vercel domain"
          git push
